<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Añadir / Editar Libro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container py-5 animate-fade-in">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="glass-panel p-5">
                    <h3 class="mb-4 text-white" th:text="${libro.id != null ? 'Editar Libro' : 'Añadir Nuevo Libro'}"></h3>
                    
                    <form th:action="@{/guardar}" th:object="${libro}" method="post">
                        <!-- Campo Oculto para ID -->
                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label class="form-label text-secondary">Título</label>
                            <input type="text" class="form-control" th:field="*{titulo}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary">Autor</label>
                            <input type="text" class="form-control" th:field="*{autor}" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-secondary">Año de publicación</label>
                                <input type="number" class="form-control" th:field="*{anio}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-secondary">Precio (€)</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{precio}" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary">Descripción</label>
                            <textarea class="form-control" th:field="*{descripcion}" rows="3" placeholder="Breve resumen del libro..."></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary">URL de la Imagen</label>
                            <input type="url" class="form-control" th:field="*{imagen}">
                        </div>

                        <div class="mt-4 text-end">
                            <a th:href="@{/}" class="btn btn-secondary me-2">Cancelar</a>
                            <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i> Guardar Libro</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
