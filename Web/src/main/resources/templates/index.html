<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container py-5 animate-fade-in">
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold m-0"><i class="fas fa-list mt-1 me-2 text-primary"></i> Todos los Libros</h2>
            <a th:href="@{/nuevo}" class="btn btn-primary rounded-pill px-4">
                <i class="fas fa-plus me-2"></i> Añadir Libro
            </a>
        </div>

        <div class="glass-panel p-4 mb-5">
            <h5 class="mb-3 text-secondary"><i class="fas fa-search me-2"></i> Filtros de Búsqueda</h5>
            <form th:action="@{/}" method="get">
                <div class="row g-3">
                    <div class="col-md-3">
                        <input type="text" name="titulo" class="form-control" placeholder="Buscar por Título...">
                    </div>
                    <div class="col-md-3">
                        <input type="text" name="autor" class="form-control" placeholder="Buscar por Autor...">
                    </div>
                    <div class="col-md-2">
                        <input type="number" name="inicio" class="form-control" placeholder="Año Inicio">
                    </div>
                    <div class="col-md-2">
                        <input type="number" name="fin" class="form-control" placeholder="Año Fin">
                    </div>
                    <div class="col-md-2 d-grid">
                        <button type="submit" class="btn btn-outline-light"><i class="fas fa-filter"></i> Filtrar</button>
                    </div>
                </div>
            </form>
            <div class="mt-2 text-end">
                <a th:href="@{/}" class="btn btn-link text-secondary text-decoration-none btn-sm">
                    <i class="fas fa-sync me-1"></i> Limpiar Filtros
                </a>
            </div>
        </div>

        <div class="glass-panel p-4">
            <div class="table-responsive">
                <table class="table table-borderless align-middle">
                    <thead>
                        <tr>
                            <th>Portada</th>
                            <th>Título</th>
                            <th>Autor</th>
                            <th>Año</th>
                            <th>Precio</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${libros == null or libros.empty}">
                            <td colspan="6" class="text-center py-4 text-secondary">No se encontraron libros.</td>
                        </tr>
                        <tr th:each="libro : ${libros}">
                            <td>
                                <img th:src="${libro.imagen != null and !libro.imagen.empty ? libro.imagen : 'https://via.placeholder.com/50x70?text=No+Img'}" 
                                     class="book-cover" alt="Portada">
                            </td>
                            <td class="fw-bold" th:text="${libro.titulo}"></td>
                            <td th:text="${libro.autor}"></td>
                            <td><span class="badge bg-secondary" th:text="${libro.anio}"></span></td>
                            <td class="text-success fw-bold" th:text="${libro.precio != null ? libro.precio + ' €' : '-'}"></td>
                            <td class="text-end">
                                <a th:href="@{/editar/{id}(id=${libro.id})}" class="btn btn-sm btn-outline-info me-2">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <a th:href="@{/borrar/{id}(id=${libro.id})}" onclick="return confirm('¿Borrar libro?');" class="btn btn-sm btn-outline-danger">
                                    <i class="fas fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
