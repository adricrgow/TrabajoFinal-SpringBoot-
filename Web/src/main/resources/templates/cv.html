<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca | Mi CV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">
                <i class="fas fa-book-open me-2"></i> BibliotecaPro
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}"><i class="fas fa-swatchbook me-1"></i> Catálogo</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/cv}"><i class="fas fa-user-tie me-1"></i> Mi CV</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5 animate-fade-in">
        
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        
        <div th:if="${cv != null}" class="row justify-content-center">
            <div class="col-lg-8">
                <div class="glass-panel text-center p-5">
                    <div class="cv-header pt-0">
                        <div class="mb-4">
                            <i class="fas fa-user-circle fa-6x text-primary shadow-sm rounded-circle"></i>
                        </div>
                        <h1 class="fw-bold" th:text="${cv.nombre} + ' ' + ${cv.apellidos}">Nombre Apellidos</h1>
                        <h4 class="text-info mt-2" th:text="${cv.profesion}">Profesión</h4>
                    </div>
                    
                    <div class="row text-start mt-5">
                        <div class="col-md-12 mb-4">
                            <h5 class="text-secondary border-bottom border-secondary pb-2"><i class="fas fa-info-circle me-2"></i> Sobre Mí</h5>
                            <p class="lead fs-6 mt-3" th:text="${cv.descripcion}">Descripción</p>
                        </div>
                    </div>

                    <div class="row text-start mt-3">
                        <div class="col-md-12">
                            <h5 class="text-secondary border-bottom border-secondary pb-2"><i class="fas fa-laptop-code me-2"></i> Habilidades</h5>
                            <div class="mt-4">
                                <span class="skill-badge" th:each="skill : ${cv.habilidades}">
                                    <i class="fas fa-check-circle me-1"></i> <span th:text="${skill}"></span>
                                </span>
                            </div>
                        </div>
                    </div>

                    <div class="mt-5 text-center">
                        <a th:href="@{/}" class="btn btn-outline-light rounded-pill px-4">
                            <i class="fas fa-arrow-left me-2"></i> Volver a la Biblioteca
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
